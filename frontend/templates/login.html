<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SockeText — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #151518;
      --surface2:  #1c1c21;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.14);
      --accent:    #7c6af7;
      --accent-dim:#3d3580;
      --text:      #e8e8ed;
      --text-2:    #888897;
      --text-3:    #44444e;
      --font:      'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-name {
      font-family: var(--font-mono);
      font-size: 17px; font-weight: 500;
      color: var(--text); letter-spacing: 0.01em;
    }

    .heading { display: flex; flex-direction: column; gap: 6px; }
    .heading h1 { font-size: 20px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
    .heading p  { font-size: 13px; color: var(--text-2); line-height: 1.5; }

    .form  { display: flex; flex-direction: column; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px; font-weight: 500;
      color: var(--text-2); letter-spacing: 0.04em; text-transform: uppercase;
    }
    .field input {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      font-family: var(--font); font-size: 14px; color: var(--text);
      outline: none; transition: border-color 0.15s; width: 100%;
    }
    .field input::placeholder { color: var(--text-3); }
    .field input:focus { border-color: var(--accent-dim); }

    .btn-enter {
      margin-top: 4px; width: 100%; padding: 11px;
      border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff;
      font-family: var(--font); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-enter:hover  { background: #6a58e0; }
    .btn-enter:active { transform: scale(0.98); }
    .btn-enter svg { transition: transform 0.2s; }
    .btn-enter:hover svg { transform: translateX(3px); }

    .card-footer {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-3); text-align: center; letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="card" role="main">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="#fff"/>
        </svg>
      </div>
      <span class="logo-name">SockeText</span>
    </div>

    <div class="heading">
      <h1>Bem-vindo</h1>
      <p>Digite seu nome para entrar na conversa ao vivo.</p>
    </div>

    <form class="form" method="POST" action="/login">
      <div class="field">
        <label for="name">Seu nome</label>
        <input
          type="text" id="name" name="name"
          placeholder="ex: Maria Silva"
          maxlength="32" autocomplete="off" autocorrect="off"
          spellcheck="false" autofocus required
        />
      </div>
      <button class="btn-enter" type="submit">
        Entrar
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 8H13M13 8L8.5 3.5M13 8L8.5 12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </form>

    <p class="card-footer">CHAT EM TEMPO REAL · AO VIVO</p>
  </div>
</body>
</html>
