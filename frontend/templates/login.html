<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SockeText — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-bg__orb login-bg__orb--1"></div>
    <div class="login-bg__orb login-bg__orb--2"></div>
    <div class="login-bg__orb login-bg__orb--3"></div>
  </div>

  <div class="login-card">
    <div class="login-card__icon">✦</div>
    <h1 class="login-card__title">SockeText</h1>
    <p class="login-card__sub">Chat em tempo real</p>

    <form method="POST" action="/login" class="login-form">
      <div class="field">
        <label class="field__label" for="username">Seu nome</label>
        <input
          class="field__input"
          id="username"
          name="username"
          type="text"
          placeholder="Como quer ser chamado?"
          maxlength="32"
          autocomplete="off"
          autofocus
          required
        />
      </div>
      <button class="login-btn" type="submit">
        Entrar <span class="login-btn__arrow">→</span>
      </button>
    </form>
  </div>

</body>
</html>
