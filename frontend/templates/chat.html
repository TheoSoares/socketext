<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SockeText</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const SERVERS = {{ servers | tojson }};
    const NAME    = {{ name | tojson }};
  </script>
</head>
<body class="chat-page">

  <div class="chat-wrap">

    <header class="chat-header">
      <div class="chat-header__brand">
        <span class="chat-header__icon">✦</span>
        <span class="chat-header__name">SockeText</span>
      </div>
      <div class="chat-header__right">
        <span class="chat-header__status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusLabel">conectando...</span>
        </span>
        <span class="chat-header__user">
          <span class="chat-header__avatar">{{ name[0]|upper }}</span>
          {{ name }}
        </span>
        <a href="/logout" class="chat-header__logout">Sair</a>
      </div>
    </header>

    <main class="chat-body">
      <div id="messages" class="messages" aria-live="polite" aria-label="Mensagens"></div>
      <div id="typing-indicator" class="typing" hidden></div>
    </main>

    <footer class="chat-footer">
      <div class="composer">
        <input
          id="message-input"
          class="composer__input"
          type="text"
          placeholder="Escreva uma mensagem…"
          maxlength="500"
          autocomplete="off"
        />
        <button id="send-btn" class="composer__send" aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
